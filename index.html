<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THALAAL ❤️ AMIRA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
background:url("gif/love.gif") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* INTRO SCREEN */
#intro{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
}

#introText{font-size:28px;margin-bottom:20px;}

#enterBtn{
padding:12px 22px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
cursor:pointer;
display:none;
}

/* APP */
.app{
width:380px;
background:rgba(255,255,255,0.9);
border-radius:30px;
padding:25px;
text-align:center;
position:relative;
}

/* BUTTONS FIXED */
.tabs{
display:flex;
flex-wrap:wrap;
gap:10px; /* 🔥 spacing fix */
justify-content:center;
margin-top:10px;
}

button{
background:#ff4d6d;
border:none;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* SECTIONS */
.section{display:none;margin-top:20px;}
.active{display:block;}

/* MEMORY GAME */
#memoryBoard{
width:320px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
width:70px;
height:70px;
background:#ff4d6d;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
object-fit:cover; /* 🔥 FIXED STRETCH */
display:none;
}

.card.flipped img{display:block;}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#ff4d6d;
color:white;
padding:20px;
border-radius:20px;
z-index:9999;
}

/* HEARTS */
.heart{
position:absolute;
font-size:24px;
animation:float 6s linear forwards;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-110vh)}
}

.gift{font-size:80px;cursor:pointer;}
</style>
</head>

<body>

<div id="intro">
<h1 id="introText"></h1>
<button id="enterBtn" onclick="startApp()">Here’s a little surprise ❤️</button>
</div>

<audio id="music" src="music/song1.mp3"></audio>

<div class="app">

<h1>THALAAL ❤️ AMIRA</h1>

<div class="tabs">
<button onclick="show('home')">Home</button>
<button onclick="show('reasons')">Reasons</button>
<button onclick="show('memory')">Matching Cute Pics</button>
<button onclick="show('game')">Infinite Hearts</button>
<button onclick="show('gift')">Gift</button>
<button onclick="show('forever')">Forever</button>
</div>

<div id="home" class="section active">
<p>You make my world brighter every single day ❤️</p>
<p id="days"></p>
</div>

<div id="reasons" class="section">
<p id="reasonText">Why I love you 💖</p>
<button onclick="newReason()">Hehehehe</button>
</div>

<div id="memory" class="section">
<p>Match Our Memories ❤️</p>
<div id="memoryBoard"></div>
<button onclick="startMemoryGame()">Restart Game</button>
<p id="memoryMessage"></p>
</div>

<div id="game" class="section">
<h2 id="score">0</h2>
<button onclick="addPoint()">❤️</button>
</div>

<div id="gift" class="section">
<p>Click on this Baby 🎁</p>
<div class="gift" onclick="loveExplosion()">🎁</div>
</div>

<div id="forever" class="section">
<h2>Will you be my forever? 💍</h2>
<button onclick="answerYes()">YES ❤️</button>
<button id="noBtn" onmouseover="moveNo()">No</button>
</div>

</div>

<script>

/* INTRO TEXT */
const msg="Here's a surprise for you ❤️";
let i=0;
function typeIntro(){
if(i<msg.length){
document.getElementById("introText").innerHTML+=msg[i];
i++;
setTimeout(typeIntro,50);
}else{
document.getElementById("enterBtn").style.display="block";
}}
typeIntro();

/* MUSIC */
const music=document.getElementById("music");
function startApp(){
music.loop=true;
music.play();
document.getElementById("intro").style.display="none";
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* POPUP */
function showMessage(text){
const p=document.createElement("div");
p.className="popup";
p.innerText=text;
document.body.appendChild(p);
setTimeout(()=>p.remove(),2000);
}

/* GIFT */
function loveExplosion(){
showMessage("You are the best thing to ever happen in my life ❤️");
}

/* FOREVER */
function answerYes(){
showMessage("THALAAL ❤️ AMIRA forever!");
}

/* MOVE NO */
function moveNo(){
const btn=document.getElementById("noBtn");
const app=document.querySelector(".app");

const maxX=app.clientWidth-btn.offsetWidth-20;
const maxY=app.clientHeight-btn.offsetHeight-20;

btn.style.position="absolute";
btn.style.left=Math.random()*maxX+"px";
btn.style.top=Math.random()*maxY+"px";
}

/* MEMORY GAME */
const images=[
"images/img1.jpeg","images/img2.jpeg","images/img3.jpeg",
"images/img4.jpeg","images/img5.jpeg","images/img6.jpeg"
];

let cards=[],flipped=[],matches=0;

function startMemoryGame(){
const board=document.getElementById("memoryBoard");
board.innerHTML="";
cards=[...images,...images].sort(()=>0.5-Math.random());
flipped=[];matches=0;

cards.forEach(img=>{
const card=document.createElement("div");
card.className="card";

const image=document.createElement("img");
image.src=img;

card.appendChild(image);
card.onclick=()=>flipCard(card,img);
board.appendChild(card);
});
}

function flipCard(card,img){
if(card.classList.contains("flipped")||flipped.length===2)return;

card.classList.add("flipped");
flipped.push({card,img});

if(flipped.length===2){
if(flipped[0].img===flipped[1].img){
matches++;flipped=[];
if(matches===6){
document.getElementById("memoryMessage").innerText="You matched it yayyyyy ❤️";
}
}else{
setTimeout(()=>{
flipped[0].card.classList.remove("flipped");
flipped[1].card.classList.remove("flipped");
flipped=[];
},800);
}}
}
startMemoryGame();

/* REASONS */
let reasons=[
"I love your smile","I love your laugh","I love your kindness",
"I love how you make me happy everytime just by existing",
"I love your beautiful eyes which pierces through my heart",
"I love your voice which is a blessing to my ears",
"I love spending time with you even if it's the last few seconds on earth",
"I love everything about you My Sayangku ❤️"
];

let reasonIndex = 0;

function newReason(){

if(reasonIndex >= reasons.length){
    document.getElementById("reasonText").innerText =
    "These are not all of the reasons... I could list thousands more ❤️";

    return; // 🔥 THIS stops everything completely
}

document.getElementById("reasonText").innerText = reasons[reasonIndex];

reasonIndex++;

}




/* HEART GAME */
let score=0;
function addPoint(){
score++;
document.getElementById("score").innerText=score;
}

/* HEARTS */
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=Math.random()*100+"vw";
h.style.bottom="0";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},600);

/* TIMER */
const diff=Math.floor((new Date()-new Date("2025-12-20"))/(1000*60*60*24));
document.getElementById("days").innerText=diff+" days ❤️";

</script>

</body>
</html>
