<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THALAAL ❤️ AMIRA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
background:url("gif/love.gif") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

#intro{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
padding:40px;
}

#introText{
font-size:28px;
margin-bottom:30px;
}

#enterBtn{
padding:12px 22px;
font-size:16px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
cursor:pointer;
display:none;
}

.app{
width:380px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(20px);
border-radius:30px;
padding:25px;
box-shadow:0 30px 60px rgba(0,0,0,0.2);
text-align:center;
z-index:5;
position:relative;
}

h1{
color:#ff4d6d;
margin-bottom:10px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
margin-top:10px;
}

button{
background:#ff4d6d;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.section{
display:none;
margin-top:20px;
}

.active{
display:block;
}

.timer{
font-size:18px;
margin-top:10px;
}

.reason{
font-size:18px;
margin:10px 0;
}

.heart{
position:absolute;
font-size:24px;
color:#ff4d6d;
pointer-events:none;
transition:transform 0.1s linear;
animation:float 6s linear forwards;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-110vh)}
}

.gift{
font-size:80px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

#memoryBoard{
width:320px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
width:70px;
height:70px;
background:#ff4d6d;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.card.flipped img{
display:block;
}
</style>
</head>

<body>

<div id="intro">
<h1 id="introText"></h1>
<button id="enterBtn" onclick="startApp()">Here's a little surprise to My Sayang ❤️</button>
</div>

<!-- FIXED AUDIO -->
<audio id="music" src="music/song1.mp3"></audio>

<div class="app">

<h1>THALAAL ❤️ AMIRA</h1>

<div class="tabs">
<button onclick="show('home')">Home</button>
<button onclick="show('reasons')">Reasons</button>
<button onclick="show('memory')">Matching Cute Pics</button>
<button onclick="show('game')">Infinite Hearts</button>
<button onclick="show('gift')">Gift</button>
<button onclick="show('forever')">Forever</button>
</div>

<div id="home" class="section active">
<p>You make my world brighter every single day, and I have never been more happier in life.</p>
<p class="timer">We have been together for</p>
<p id="days" class="timer"></p>
</div>

<div id="reasons" class="section">
<p class="reason" id="reasonText">Why I love you 💖</p>
<button onclick="newReason()">Hehehehe</button>
</div>

<div id="memory" class="section">
<p>Match Our Memories ❤️</p>
<div id="memoryBoard"></div>
<button onclick="startMemoryGame()">Restart Game</button>
<p id="memoryMessage"></p>
</div>

<div id="game" class="section">
<p>Tap the heart!</p>
<h2 id="score">0</h2>
<button onclick="addPoint()">❤️</button>
</div>

<div id="gift" class="section">
<p>Click on this Baby 🎁</p>
<div class="gift" onclick="loveExplosion()">🎁</div>
</div>

<div id="forever" class="section">
<h2>Will you be my forever? 💍</h2>
<button onclick="answerYes()">YES ❤️</button>
<button onmouseover="moveNo(this)" onclick="moveNo(this)">No</button>
</div>

</div>

<script>

/* INTRO */
const introMessage="Sayangku I have made something special for you ❤️";
let i=0;

function typeIntro(){
if(i<introMessage.length){
document.getElementById("introText").innerHTML+=introMessage.charAt(i);
i++;
setTimeout(typeIntro,60);
}else{
document.getElementById("enterBtn").style.display="block";
}
}
typeIntro();

/* AUDIO SETUP */
const music = document.getElementById("music");
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioContext.createAnalyser();
const source = audioContext.createMediaElementSource(music);

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize=256;
const dataArray=new Uint8Array(analyser.frequencyBinCount);

/* START APP */
function startApp(){

audioContext.resume();

music.volume = 0;
music.loop = true;
music.play();

let fade = setInterval(()=>{
if(music.volume < 0.6){
music.volume += 0.05;
}else{
clearInterval(fade);
}
},200);

document.getElementById("intro").style.display="none";
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* POPUP MESSAGE */
function showMessage(text){
const msg = document.createElement("div");
msg.innerText = text;
msg.style.position="fixed";
msg.style.top="50%";
msg.style.left="50%";
msg.style.transform="translate(-50%, -50%)";
msg.style.background="#ff4d6d";
msg.style.color="white";
msg.style.padding="20px 30px";
msg.style.borderRadius="20px";
msg.style.fontSize="18px";
msg.style.zIndex="9999";
msg.style.boxShadow="0 10px 30px rgba(0,0,0,0.3)";
msg.style.textAlign="center";
document.body.appendChild(msg);
setTimeout(()=> msg.remove(),2500);
}

/* GIFT */
function loveExplosion(){
showMessage("You are the best thing to ever happen in my life ❤️");
}

/* FOREVER */
function answerYes(){
showMessage("THALAAL ❤️ AMIRA forever!");
}

/* TIMER */
const startDate=new Date("2025-12-20");
const today=new Date();
const diff=Math.floor((today-startDate)/(1000*60*60*24));
document.getElementById("days").innerText=diff+" days ❤️";

</script>

</body>
</html>
