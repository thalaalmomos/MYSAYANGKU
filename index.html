<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THALAAL ❤️ AMIRA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
background:url("gif/love.gif") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

#intro{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
padding:40px;
}

#introText{
font-size:28px;
margin-bottom:30px;
}

#enterBtn{
padding:12px 22px;
font-size:16px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
cursor:pointer;
display:none;
}

.app{
width:380px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(20px);
border-radius:30px;
padding:25px;
box-shadow:0 30px 60px rgba(0,0,0,0.2);
text-align:center;
z-index:5;
position:relative;
}

h1{
color:#ff4d6d;
margin-bottom:10px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
margin-top:10px;
}

button{
background:#ff4d6d;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.section{
display:none;
margin-top:20px;
}

.active{
display:block;
}

.timer{
font-size:18px;
margin-top:10px;
}

.reason{
font-size:18px;
margin:10px 0;
}

.heart{
position:absolute;
font-size:24px;
color:#ff4d6d;
pointer-events:none;
animation:float 6s linear forwards;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-110vh)}
}

.gift{
font-size:80px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div id="intro">
<h1 id="introText"></h1>
<button id="enterBtn" onclick="startApp()">Here's a little surprise to My Sayang ❤️</button>
</div>

<audio id="music" src="music/song1.mp3"></audio>

<div class="app">
<h1>THALAAL ❤️ AMIRA</h1>

<div class="tabs">
<button onclick="show('home')">Home</button>
<button onclick="show('reasons')">Reasons</button>
<button onclick="show('game')">Infinite Hearts</button>
<button onclick="show('gift')">Gift</button>
<button onclick="show('forever')">Forever</button>
</div>

<div id="home" class="section active">
<p>You make my world brighter every single day ❤️</p>
<p id="days"></p>
</div>

<div id="reasons" class="section">
<p id="reasonText">Why I love you 💖</p>
<button onclick="newReason()">Hehehehe</button>
</div>

<div id="game" class="section">
<h2 id="score">0</h2>
<button onclick="addPoint()">❤️</button>
</div>

<div id="gift" class="section">
<div class="gift" onclick="loveExplosion()">🎁</div>
</div>

<div id="forever" class="section">
<h2>Will you be my forever? 💍</h2>
<button onclick="answerYes()">YES ❤️</button>
<button onmouseover="moveNo(this)">No</button>
</div>

</div>

<script>

/* INTRO */
const introMessage="Sayangku I have made something special for you ❤️";
let i=0;

function typeIntro(){
if(i<introMessage.length){
document.getElementById("introText").innerHTML+=introMessage.charAt(i);
i++;
setTimeout(typeIntro,60);
}else{
document.getElementById("enterBtn").style.display="block";
}
}
typeIntro();

/* MUSIC (FIXED) */
const music = document.getElementById("music");

function startApp(){
music.volume = 0;
music.loop = true;
music.play();

let fade = setInterval(()=>{
if(music.volume < 0.6){
music.volume += 0.05;
}else{
clearInterval(fade);
}
},200);

document.getElementById("intro").style.display="none";
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* POPUP */
function showMessage(text){
const msg=document.createElement("div");
msg.innerText=text;
msg.style.position="fixed";
msg.style.top="50%";
msg.style.left="50%";
msg.style.transform="translate(-50%,-50%)";
msg.style.background="#ff4d6d";
msg.style.color="white";
msg.style.padding="20px";
msg.style.borderRadius="20px";
msg.style.zIndex="9999";
document.body.appendChild(msg);
setTimeout(()=>msg.remove(),2000);
}

/* GIFT */
function loveExplosion(){
showMessage("You are my everything ❤️");
}

/* FOREVER */
function answerYes(){
showMessage("Forever starts now ❤️");
}

/* SIMPLE HEARTS (NO AUDIO BUGS) */
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=Math.random()*100+"vw";
h.style.bottom="0";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

/* TIMER */
const diff=Math.floor((new Date()-new Date("2025-12-20"))/(1000*60*60*24));
document.getElementById("days").innerText=diff+" days ❤️";

</script>

</body>
</html>
